set timeout=3
set default=0
terminal_input console
terminal_output console

menuentry "SDUL - SuperDuperUltraLightweight Linux" {
    linux /boot/vmlinuz-x86_64 console=tty0 console=ttyS0,115200 quiet
    initrd /boot/initrd-x86_64.img
}

menuentry "SDUL - Verbose boot" {
    linux /boot/vmlinuz-x86_64 console=tty0 console=ttyS0,115200
    initrd /boot/initrd-x86_64.img
}
